version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/clipeos
      - JWT_SECRET=your-production-jwt-secret
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=clipeos-clips
      - S3_ENDPOINT=https://s3.amazonaws.com
    depends_on:
      - mongo
      - redis
    volumes:
      - ./uploads:/app/uploads

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: